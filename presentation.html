<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI for Palestine Smart Library - Final Presentation</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for diagrams -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        
        document.addEventListener('DOMContentLoaded', async () => {
            const markdownText = "# AI for Palestine Smart Library - Final Presentation\n\n## Slide 1: Architecture Type\n\n**Agentic RAG**\n\n- **Standard RAG vs. Agentic RAG**: Standard RAG pipelines blindly pass retrieved context to the LLM, leading to a high risk of hallucination if the retrieval is poor. Our architecture uses an Agentic RAG approach powered by LangGraph.\n- **The \"Grade Evidence\" Node**: We introduced a critical LLM-as-judge step before generation. This node rapidly evaluates each retrieved chunk for relevance to the user's question.\n- **Avoiding the -20 Point Penalty**: If no chunks pass the grading step, the agent actively aborts generation and routes to a deterministic \"Fallback\" node. This ensures the system replies exactly with \"not found in documents,\" completely avoiding the severe hallucination penalty by strictly verifying data before attempting an answer.\n\n---\n\n## Slide 2: Architecture Diagram\n\n```mermaid\nflowchart TD\n    subgraph Data Ingestion\n        PDF[\"PDFs (Arabic & English)\"] --> CHUNK[\"Chunking\\n(Title/Page Metadata)\"]\n        CHUNK --> EMBED[\"Embeddings\\n(HuggingFace all-MiniLM-L6-v2)\"]\n        EMBED --> DB[(\"ChromaDB\\nPersistent Store\")]\n    end\n\n    subgraph LangGraph Agentic Workflow\n        UQ([\"\ud83e\uddd1 User Query\"]) --> N1\n        N1[\"Analyze Query\\n(Detect Language & Intent)\"] --> N2\n        N2[\"Plan Retrieval\\n(Dynamic k)\"] --> N3\n        DB -.-> N3\n        N3[\"Retrieve\\n(Similarity Search)\"] --> N4\n        N4{\"Grade Evidence\\n(Decision Diamond)\"}\n\n        N4 -- Sufficient --> N5[\"Generate Answer\\n(Bilingual, with Citations)\"]\n        N4 -- Insufficient --> FB[\"Refuse Answer\\n('Not found in documents')\"]\n    end\n\n    N5 --> OUT([\"\u2705 Answer + Citations\"])\n    FB --> OUT\n\n    style N1 fill:#1a1a4e,color:#fff\n    style N2 fill:#2d2b7a,color:#fff\n    style N3 fill:#667eea,color:#fff\n    style N4 fill:#a855f7,color:#fff\n    style N5 fill:#764ba2,color:#fff\n    style FB fill:#7f1d1d,color:#fff\n```\n\n---\n\n## Slide 3: Architecture Explanation\n\n- **Language Detection Routing:** The first agent node analyzes the query. If it contains >15% Arabic characters, it dynamically routes the entire generation pipeline and prompts to reply strictly in Arabic. It also classifies the intent (factual/analytical) to adjust the retrieval size `k`.\n- **Retrieval Logic from ChromaDB:** Based on the query plan, the system queries the local ChromaDB vector store using HuggingFace sentence-transformers. Analytical/comparative queries dynamically append context keywords (like \"history,\" \"cause\") to improve vector recall.\n- **The Agent's Decision-Making (Grading):** A fast LLM call scores each retrieved chunk (1 for relevant, 0 for irrelevant). The agent drops irrelevant chunks to reduce noise. If the final filtered context is empty, the agent refuses to answer.\n- **Forcing Exact Citations:** During the PDF ingestion phase, we strictly attach `document_title` and `page_number` to every chunk's metadata. The final Generation node prompt explicitly injects this metadata and forces the rule: \"Every answer MUST end with the citation: (Source: [Title], Page: [Page Number]).\"\n\n---\n\n## Slide 4: Technical Challenges & Specific Solutions\n\n- **Challenge 1: The \"Secret PDF Test\"**\n  - _Problem:_ Injecting a brand-new PDF into the active vector store securely without restarting the Streamlit app or mixing it with the 15 baseline documents.\n  - _Solution:_ We built a live ingestion pipeline (`pdfplumber` with `PyPDFLoader` fallback) that chunks and batches vectors (size 200) straight into the active ChromaDB instance. To prevent the \"Grade Evidence\" node from rejecting this unseen document, we implemented a dedicated router (`run_rag_on_document`) that uses ChromaDB metadata filters (`where={\"document_title\": ...}`) to securely restrict the context to _only_ the new PDF.\n- **Challenge 2: Enforcing Strict Citations & Zero-Hallucination**\n  - _Problem:_ LLMs tend to answer from their pre-trained weights when the context is missing, violating the strict competition rules.\n  - _Solution:_ We solved this using a dual-layer defense. First, the LangGraph conditional routing completely bypasses the LLM generation node if the context isn't highly relevant. Second, the system prompt contains aggressive constraints (\"Answer ONLY from context,\" \"If not found: reply EXACTLY: 'not found'\").\n\n---\n\n## Slide 5: Innovation & Bonus Features\n\n- **Voice STT/TTS:** Integrated **Groq Whisper** for lightning-fast, auto-detecting Arabic/English speech-to-text, and **gTTS** to read bilingual answers out loud.\n- **Multi-Model Comparison:** Built a live toggle to run side-by-side, real-time comparisons of **Llama-3 (8B)** and **Mixtral (8x7B)** using Groq APIs.\n- **One-Click Translation:** A dedicated AI Grid translation button dynamically translates any assistant response or historical chat message between Arabic and English.\n- **JSON Export:** Implemented a one-click sidebar utility to download the entire structured chat history as a JSON file.\n- **Advanced Analytics Dashboard:** Designed a dynamic Plotly dashboard featuring query sentiment progression (line charts), corpus entity frequency (horizontal bars), and interactive vector cosine similarity (heatmaps).\n\n---\n\n**GitHub Repository:** [https://github.com/maicro24/palestine_chatbot](https://github.com/maicro24/palestine_chatbot)\n**HuggingFace Link:** [https://huggingface.co/spaces/okjlkli/palestine_chatboot/tree/main](https://huggingface.co/spaces/okjlkli/palestine_chatboot/tree/main)\n**Live Streamlit App:** [https://palestinechatbot-lc3kf4mx5rav8r8corjmdi.streamlit.app/](https://palestinechatbot-lc3kf4mx5rav8r8corjmdi.streamlit.app/)\n";
            const contentDiv = document.getElementById('content');
            
            // Parse Markdown to HTML
            contentDiv.innerHTML = marked.parse(markdownText);
            
            // Find all mermaid code blocks and convert them to mermaid divs
            const mermaidBlocks = document.querySelectorAll('code.language-mermaid');
            mermaidBlocks.forEach(block => {
                const pre = block.parentElement;
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.textContent;
                pre.parentNode.replaceChild(div, pre);
            });
            
            // Render Mermaid diagrams
            await mermaid.run({
                querySelector: '.mermaid',
            });
        });
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #ffffff;
        }
        h1, h2, h3 {
            color: #1a1a4e;
            margin-top: 1.5em;
            page-break-after: avoid;
        }
        h1 { border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        h2 { border-bottom: 2px solid #667eea; padding-bottom: 5px; }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 4px;
            color: #d11141;
        }
        pre code {
            background: transparent;
            color: inherit;
        }
        hr {
            border: 0;
            height: 2px;
            background: #e8e8e8;
            margin: 60px 0;
            page-break-before: always; /* Creates a new page for each slide when printing */
        }
        .mermaid {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        /* Print Styles for PDF export */
        @media print {
            body {
                background-color: white;
                padding: 0;
                margin: 0;
            }
            hr {
                display: none; /* Hide HR when printing to PDF, page-break handles it */
            }
            .slide-break {
                page-break-before: always;
            }
        }
    </style>
</head>
<body>
    <div id="content"></div>
</body>
</html>
